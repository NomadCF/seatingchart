name: AI source export

on:
  push:
    branches:
      - ai/mobile-controls-audit
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: seatingchart-source
          path: |
            index.html
            README.md
          if-no-files-found: error
          retention-days: 1
