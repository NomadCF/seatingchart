name: AI source export

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request source
        uses: actions/checkout@v4
      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: seatingchart-source
          path: |
            index.html
            README.md
          if-no-files-found: error
          retention-days: 1
